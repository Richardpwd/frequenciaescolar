<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avance | Login</title>
  <link rel="icon" href="/logo.jpeg" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <main class="auth-layout">
    <section class="card auth-card">
      <div class="logo">
        <img src="/logo.jpeg" alt="Logo Avance" class="logo-image" />
        <div>
          <span class="logo-name">Avance</span>
          <small class="logo-tagline">Educacao acompanhada de perto</small>
        </div>
      </div>
      <h1 class="auth-title">Controle de Frequencia</h1>
      <p class="auth-subtitle">Acesse para registrar presencas dos alunos.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input id="usuario" type="text" required />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input id="senha" type="password" required />
        </div>

        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <div id="alert-box" class="alert"></div>

      <div class="link-row">
        <a href="/forgot.html">esqueci a senha</a>
        <a href="/register.html">novo usuario</a>
      </div>
    </section>
  </main>

  <script type="module" src="/assets/js/login.js"></script>
</body>
</html>
